name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# AC3 — CI runs install -> lint -> typecheck -> test and blocks merge on failure.
# Branch protection (required status check "ci") is documented in docs/framework/ci.md.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
